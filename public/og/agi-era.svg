<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E0B08"/>
      <stop offset="100%" style="stop-color:#1C1410"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#B23A24;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#B23A24;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="line-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B23A24;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#B23A24;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#B23A24;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B23A24;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Central glow -->
  <ellipse cx="600" cy="315" rx="400" ry="300" fill="url(#glow)"/>

  <!-- Neural network lines emanating from center -->
  <g stroke="#B23A24" stroke-width="0.8" opacity="0.25">
    <line x1="600" y1="315" x2="100" y2="80"/>
    <line x1="600" y1="315" x2="250" y2="50"/>
    <line x1="600" y1="315" x2="450" y2="40"/>
    <line x1="600" y1="315" x2="700" y2="40"/>
    <line x1="600" y1="315" x2="900" y2="60"/>
    <line x1="600" y1="315" x2="1100" y2="80"/>
    <line x1="600" y1="315" x2="1150" y2="200"/>
    <line x1="600" y1="315" x2="1160" y2="400"/>
    <line x1="600" y1="315" x2="1100" y2="540"/>
    <line x1="600" y1="315" x2="900" y2="580"/>
    <line x1="600" y1="315" x2="700" y2="595"/>
    <line x1="600" y1="315" x2="450" y2="595"/>
    <line x1="600" y1="315" x2="280" y2="570"/>
    <line x1="600" y1="315" x2="100" y2="520"/>
    <line x1="600" y1="315" x2="50" y2="380"/>
    <line x1="600" y1="315" x2="50" y2="220"/>
  </g>

  <!-- Secondary network nodes -->
  <g fill="#B23A24" opacity="0.6">
    <circle cx="100" cy="80" r="3"/>
    <circle cx="250" cy="50" r="3"/>
    <circle cx="450" cy="40" r="3"/>
    <circle cx="700" cy="40" r="3"/>
    <circle cx="900" cy="60" r="3"/>
    <circle cx="1100" cy="80" r="3"/>
    <circle cx="1150" cy="200" r="3"/>
    <circle cx="1160" cy="400" r="3"/>
    <circle cx="1100" cy="540" r="3"/>
    <circle cx="900" cy="580" r="3"/>
    <circle cx="700" cy="595" r="3"/>
    <circle cx="450" cy="595" r="3"/>
    <circle cx="280" cy="570" r="3"/>
    <circle cx="100" cy="520" r="3"/>
    <circle cx="50" cy="380" r="3"/>
    <circle cx="50" cy="220" r="3"/>
  </g>

  <!-- Tertiary connections -->
  <g stroke="#5C5346" stroke-width="0.5" opacity="0.4">
    <line x1="100" y1="80" x2="250" y2="50"/>
    <line x1="250" y1="50" x2="450" y2="40"/>
    <line x1="450" y1="40" x2="700" y2="40"/>
    <line x1="700" y1="40" x2="900" y2="60"/>
    <line x1="900" y1="60" x2="1100" y2="80"/>
    <line x1="1100" y1="80" x2="1150" y2="200"/>
    <line x1="1150" y1="200" x2="1160" y2="400"/>
    <line x1="100" y1="80" x2="50" y2="220"/>
    <line x1="50" y1="220" x2="50" y2="380"/>
    <line x1="50" y1="380" x2="100" y2="520"/>
    <line x1="100" y1="520" x2="280" y2="570"/>
    <line x1="280" y1="570" x2="450" y2="595"/>
    <line x1="450" y1="595" x2="700" y2="595"/>
    <line x1="700" y1="595" x2="900" y2="580"/>
    <line x1="900" y1="580" x2="1100" y2="540"/>
    <line x1="1100" y1="540" x2="1160" y2="400"/>
  </g>

  <!-- Central core -->
  <circle cx="600" cy="315" r="90" fill="none" stroke="#B23A24" stroke-width="1.5" opacity="0.4"/>
  <circle cx="600" cy="315" r="70" fill="none" stroke="#B23A24" stroke-width="0.8" opacity="0.6"/>
  <circle cx="600" cy="315" r="50" fill="#15110D" stroke="#B23A24" stroke-width="2"/>
  <text x="600" y="332" text-anchor="middle" font-family="Reem Kufi, serif" font-size="42" fill="#E0613E" font-weight="700">AGI</text>

  <!-- Horizontal accent line -->
  <rect x="0" y="313" width="1200" height="1" fill="url(#line-fade)" opacity="0.3"/>

  <!-- Arabic title - right side -->
  <text x="1150" y="180" text-anchor="end" font-family="Reem Kufi, serif" font-size="58" fill="#F0E6D4" font-weight="500">الذكاء الاصطناعي</text>
  <text x="1150" y="248" text-anchor="end" font-family="Reem Kufi, serif" font-size="58" fill="#E0613E" font-weight="500">العام — AGI</text>
  <text x="1150" y="296" text-anchor="end" font-family="Reem Kufi, serif" font-size="22" fill="#5C5346">التطور السريع وما يعنيه لنا</text>

  <!-- Timeline on left -->
  <rect x="80" y="140" width="1" height="350" fill="#3A322A"/>

  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#8A7E6E">
    <circle cx="80" cy="180" r="4" fill="#B23A24"/>
    <text x="96" y="184">2017 — Transformer Architecture</text>

    <circle cx="80" cy="230" r="4" fill="#B23A24"/>
    <text x="96" y="234">2020 — GPT-3</text>

    <circle cx="80" cy="280" r="4" fill="#B23A24"/>
    <text x="96" y="284">2022 — ChatGPT</text>

    <circle cx="80" cy="330" r="4" fill="#E0613E"/>
    <text x="96" y="334" fill="#E0613E">2024 — Reasoning Models</text>

    <circle cx="80" cy="380" r="4" fill="#E0613E"/>
    <text x="96" y="384" fill="#E0613E">2025 — Autonomous Agents</text>

    <circle cx="80" cy="430" r="3" fill="#3A322A" stroke="#B23A24" stroke-width="1.5"/>
    <text x="96" y="434" fill="#5C5346">2026+ — ?</text>
  </g>

  <!-- Top and bottom borders -->
  <rect x="0" y="0" width="1200" height="3" fill="#B23A24" opacity="0.8"/>
  <rect x="0" y="627" width="1200" height="3" fill="#B23A24" opacity="0.8"/>

  <!-- Site mark -->
  <text x="1150" y="580" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#3A322A" letter-spacing="3">RADDAH.NET</text>
</svg>
