<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1410"/>
      <stop offset="60%" style="stop-color:#2A1F18"/>
      <stop offset="100%" style="stop-color:#1C1410"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B23A24;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#B23A24;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B23A24;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#3A322A" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accent)"/>

  <!-- Left vermillion bar -->
  <rect x="80" y="80" width="3" height="470" fill="#B23A24" opacity="0.8"/>

  <!-- Hugo → Astro diagram -->
  <!-- Hugo box -->
  <rect x="120" y="200" width="200" height="80" fill="none" stroke="#5C5346" stroke-width="1.5"/>
  <text x="220" y="232" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#8A7E6E" letter-spacing="2">HUGO</text>
  <text x="220" y="255" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5C5346">v0.118.2</text>
  <text x="220" y="272" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#5C5346">Stack Theme</text>

  <!-- Arrow -->
  <line x1="325" y1="240" x2="390" y2="240" stroke="#B23A24" stroke-width="2"/>
  <polygon points="390,234 405,240 390,246" fill="#B23A24"/>
  <text x="362" y="228" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#B23A24" letter-spacing="1">MIGRATE</text>

  <!-- Astro box -->
  <rect x="410" y="200" width="200" height="80" fill="#B23A24" opacity="0.15"/>
  <rect x="410" y="200" width="200" height="80" fill="none" stroke="#B23A24" stroke-width="1.5"/>
  <text x="510" y="232" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#E0613E" letter-spacing="2">ASTRO</text>
  <text x="510" y="255" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#B23A24">v5.x</text>
  <text x="510" y="272" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#B23A24">Cloudflare Pages</text>

  <!-- Code snippet -->
  <rect x="120" y="320" width="490" height="160" fill="#0E0B08" rx="2"/>
  <rect x="120" y="320" width="490" height="24" fill="#15110D" rx="2"/>
  <text x="134" y="336" font-family="JetBrains Mono, monospace" font-size="10" fill="#5C5346" letter-spacing="1">astro.config.mjs</text>
  <text x="134" y="368" font-family="JetBrains Mono, monospace" font-size="11" fill="#8A7E6E">// i18n: ar, en, zh</text>
  <text x="134" y="390" font-family="JetBrains Mono, monospace" font-size="11" fill="#E0613E">export default </text>
  <text x="246" y="390" font-family="JetBrains Mono, monospace" font-size="11" fill="#C8B080">defineConfig</text>
  <text x="134" y="412" font-family="JetBrains Mono, monospace" font-size="11" fill="#D4C9B5">  defaultLocale: </text>
  <text x="290" y="412" font-family="JetBrains Mono, monospace" font-size="11" fill="#B5A872">'ar'</text>
  <text x="134" y="434" font-family="JetBrains Mono, monospace" font-size="11" fill="#D4C9B5">  locales: [</text>
  <text x="240" y="434" font-family="JetBrains Mono, monospace" font-size="11" fill="#B5A872">'ar'</text>
  <text x="272" y="434" font-family="JetBrains Mono, monospace" font-size="11" fill="#5C5346">, </text>
  <text x="284" y="434" font-family="JetBrains Mono, monospace" font-size="11" fill="#B5A872">'en'</text>
  <text x="316" y="434" font-family="JetBrains Mono, monospace" font-size="11" fill="#5C5346">, </text>
  <text x="328" y="434" font-family="JetBrains Mono, monospace" font-size="11" fill="#B5A872">'zh'</text>
  <text x="360" y="434" font-family="JetBrains Mono, monospace" font-size="11" fill="#D4C9B5">]</text>
  <text x="134" y="456" font-family="JetBrains Mono, monospace" font-size="11" fill="#D4C9B5">  site: </text>
  <text x="198" y="456" font-family="JetBrains Mono, monospace" font-size="11" fill="#B5A872">'https://raddah.net'</text>

  <!-- Main Arabic title -->
  <text x="1150" y="200" text-anchor="end" font-family="Reem Kufi, serif" font-size="62" fill="#F0E6D4" font-weight="500">من Hugo</text>
  <text x="1150" y="278" text-anchor="end" font-family="Reem Kufi, serif" font-size="62" fill="#E0613E" font-weight="500">إلى Astro</text>

  <!-- Subtitle -->
  <text x="1150" y="330" text-anchor="end" font-family="Reem Kufi, serif" font-size="24" fill="#8A7E6E">رحلة إعادة البناء الكاملة</text>

  <!-- Tags -->
  <rect x="700" y="380" width="100" height="28" fill="none" stroke="#3A322A" rx="14"/>
  <text x="750" y="398" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5C5346" letter-spacing="1">ASTRO</text>

  <rect x="812" y="380" width="130" height="28" fill="none" stroke="#3A322A" rx="14"/>
  <text x="877" y="398" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5C5346" letter-spacing="1">CLOUDFLARE</text>

  <rect x="954" y="380" width="80" height="28" fill="none" stroke="#3A322A" rx="14"/>
  <text x="994" y="398" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#5C5346" letter-spacing="1">i18n</text>

  <!-- Bottom bar -->
  <text x="120" y="570" font-family="JetBrains Mono, monospace" font-size="12" fill="#3A322A" letter-spacing="3">RADDAH.NET</text>
  <text x="1150" y="570" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#3A322A" letter-spacing="2">2025</text>

  <!-- Seal -->
  <circle cx="1120" cy="490" r="50" fill="none" stroke="#3A322A" stroke-width="1.5"/>
  <circle cx="1120" cy="490" r="42" fill="none" stroke="#B23A24" stroke-width="0.8" opacity="0.5"/>
  <text x="1120" y="506" text-anchor="middle" font-family="Reem Kufi, serif" font-size="44" fill="#F0E6D4" font-weight="700">ر</text>
  <circle cx="1152" cy="458" r="5" fill="#B23A24"/>
</svg>
